<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>情侣审批系统 ❤️</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#ffe6f0">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#ffe6f0;
text-align:center;
padding:20px;
margin:0;
}
.box{
background:white;
padding:20px;
border-radius:20px;
width:95%;
max-width:420px;
margin:auto;
box-shadow:0 8px 25px rgba(255,105,180,0.15);
}
.hidden{display:none}
button{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#ff9ac2,#ff6fa5);
}
.btn-ok{background:#4CAF50}
.btn-no{background:#ff4d4d}
.btn-refresh{background:#4da6ff}
textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ffc0d6;
font-size:16px;
}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h2>情侣审批系统 ❤️</h2>
<input id="user" placeholder="账号">
<input id="pass" type="password" placeholder="密码">
<button onclick="doLogin()">登录</button>
</div>

<div id="mainBox" class="box hidden">
<h3 id="welcome"></h3>

<div id="pipiPanel" class="hidden">
<textarea id="title" placeholder="申请内容"></textarea>
<button onclick="submitApply()">提交申请</button>

<h4>当前申请状态</h4>
<div id="status"></div>

<button class="btn-refresh" onclick="refreshStatus()">刷新</button>
<button onclick="showHistory()">申请记录</button>
</div>

<div id="yiyiPanel" class="hidden">
<h4>待审批</h4>
<div id="pending"></div>

<button class="btn-refresh" onclick="refreshStatus()">刷新</button>
<button onclick="showHistory()">审批记录</button>
</div>

<div id="history"></div>
</div>

<script>
const SUPABASE_URL="https://grytodltcpczddcfjryl.supabase.co"
const SUPABASE_KEY="你的 anon public key"
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let role=""

/* 登录 */
function doLogin(){
const u=user.value
const p=pass.value
if(u==="皮皮" && p==="010906"){role="皮皮";showMain()}
else if(u==="怡怡" && p==="020609"){role="怡怡";showMain()}
else alert("账号密码错误")
}

/* 主界面 */
function showMain(){
loginBox.classList.add("hidden")
mainBox.classList.remove("hidden")
welcome.innerText="欢迎 "+role

if(role==="皮皮"){
pipiPanel.classList.remove("hidden")
loadStatus()
}else{
yiyiPanel.classList.remove("hidden")
loadPending()
}

/* ⭐⭐⭐ 实时推送 */
db.channel("realtime")
.on(
"postgres_changes",
{event:"*",schema:"public",table:"applications"},
payload=>{
refreshStatus()
})
.subscribe()
}

/* 提交申请 */
async function submitApply(){
const titleVal=title.value.trim()
if(!titleVal){alert("写点申请内容嘛");return}

await db.from("applications").update({is_current:false}).eq("applicant","皮皮")

await db.from("applications").insert({
title:titleVal,
applicant:"皮皮",
reviewer:"怡怡",
status:"待审批",
is_current:true,
created_at:new Date().toISOString()
})

title.value=""
}

/* 当前状态 */
async function loadStatus(){
const {data}=await db.from("applications")
.select("*")
.eq("applicant","皮皮")
.eq("is_current",true)
.single()

status.innerText=data
? `${data.title} 状态 ${data.status} 时间 ${new Date(data.created_at).toLocaleString("zh-CN")}`
: "暂无申请"
}

/* 待审批 */
async function loadPending(){
const {data}=await db.from("applications")
.select("*")
.eq("status","待审批")
.eq("reviewer","怡怡")

pending.innerHTML=data?.length
? data.map(a=>`
<div style="margin-top:10px">
${a.title}
<button class="btn-ok" onclick="approve(${a.id})">同意</button>
<button class="btn-no" onclick="reject(${a.id})">拒绝</button>
</div>`).join("")
: "暂无待审批"
}

/* 同意拒绝 */
async function approve(id){
await db.from("applications")
.update({status:"已通过",is_current:false})
.eq("id",id)
}
async function reject(id){
await db.from("applications")
.update({status:"已拒绝",is_current:false})
.eq("id",id)
}

/* 历史记录 带分页 */
let page=0
async function showHistory(){
const {data}=await db.from("applications")
.select("*")
.eq("applicant","皮皮")
.order("created_at",{ascending:false})
.range(page*10,page*10+9)

if(!data||data.length===0){
history.innerHTML+="<br>没有更多记录"
return
}

history.innerHTML="<h4>历史记录</h4>"+data.map(a=>
`${a.title} | ${a.status} | ${new Date(a.created_at).toLocaleString("zh-CN")}`
).join("<br>")

page++
}

/* 手动刷新 */
function refreshStatus(){
role==="皮皮"?loadStatus():loadPending()
}
</script>

</body>
</html>
