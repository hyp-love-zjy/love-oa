<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>情侣审批系统 ❤️</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#ffe6f0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#ffe6f0;
text-align:center;
padding:20px;
margin:0;
}

.box{
background:white;
padding:20px;
border-radius:20px;
width:95%;
max-width:420px;
margin:auto;
box-shadow:0 8px 25px rgba(255,105,180,0.15);
}

.hidden{display:none}

button{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#ff9ac2,#ff6fa5);
box-shadow:0 4px 10px rgba(255,105,180,0.3);
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(255,105,180,0.45);
}

.btn-ok{
background:linear-gradient(135deg,#4CAF50,#2ecc71);
}

.btn-no{
background:linear-gradient(135deg,#ff4d4d,#ff1f5a);
}

/* 刷新按钮改成蓝色区分 */
.btn-refresh{
background:linear-gradient(135deg,#4da6ff,#1f8fff);
}

textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ffc0d6;
outline:none;
font-size:16px;
}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h2>情侣审批系统 ❤️</h2>
<input id="user" placeholder="账号"><br>
<input id="pass" type="password" placeholder="密码"><br>
<button onclick="doLogin()">登录</button>
</div>

<div id="mainBox" class="box hidden">
<h3 id="welcome"></h3>

<div id="pipiPanel" class="hidden">
<textarea id="title" placeholder="申请标题"></textarea>
<button onclick="submitApply()">提交申请</button>

<h4>当前申请状态</h4>
<div id="status"></div>

<button class="btn-refresh" onclick="refreshStatus()">刷新状态</button>
<button onclick="showHistory()">申请历史</button>
</div>

<div id="yiyiPanel" class="hidden">
<h4>待审批</h4>
<div id="pending"></div>

<button class="btn-refresh" onclick="refreshStatus()">刷新状态</button>
<button onclick="showHistory()">审批历史</button>
</div>

<div id="history"></div>
</div>

<script>
const SUPABASE_URL="https://grytodltcpczddcfjryl.supabase.co"
const SUPABASE_KEY="sb_publishable_QsO6ZH_-jCnzeZXWKl8iEA_Qcc4kfn0"
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let role=""
let autoTimer=null

async function doLogin(){
const u=document.getElementById("user").value
const p=document.getElementById("pass").value

if(u==="皮皮" && p==="010906"){role="皮皮";showMain()}
else if(u==="怡怡" && p==="020609"){role="怡怡";showMain()}
else alert("账号密码错误")
}

function showMain(){
document.getElementById("loginBox").classList.add("hidden")
document.getElementById("mainBox").classList.remove("hidden")
document.getElementById("welcome").innerText="欢迎 "+role

if(role==="皮皮"){
document.getElementById("pipiPanel").classList.remove("hidden")
loadStatus()
}else{
document.getElementById("yiyiPanel").classList.remove("hidden")
loadPending()
}

/* ⭐ 自动每5秒刷新一次 */
autoTimer=setInterval(refreshStatus,5000)
}

/* 手动刷新 */
function refreshStatus(){
if(role==="皮皮"){
loadStatus()
}else{
loadPending()
}
}

async function submitApply(){
const title=document.getElementById("title").value

await db.from("applications").update({is_current:false}).eq("applicant","皮皮")

await db.from("applications").insert({
title:title,
applicant:"皮皮",
reviewer:"怡怡",
status:"待审批",
is_current:true,
created_at:new Date().toISOString()
})

alert("提交成功")
loadStatus()
}

async function loadStatus(){
const {data}=await db.from("applications")
.select("*")
.eq("applicant","皮皮")
.eq("is_current",true)
.single()

if(data){
document.getElementById("status").innerText=
data.title+" 状态："+data.status+
" 时间："+new Date(data.created_at).toLocaleString("zh-CN",{timeZone:"Asia/Shanghai"})
}else{
document.getElementById("status").innerText="暂无当前申请"
}
}

async function loadPending(){
const {data}=await db.from("applications")
.select("*")
.eq("status","待审批")
.eq("reviewer","怡怡")

let html=""
if(data && data.length>0){
data.forEach(a=>{
html+=`<div style="margin-top:10px;padding:10px;border-bottom:1px solid #ffd6e8">
${a.title}
<button class="btn-ok" onclick="approve(${a.id})">同意</button>
<button class="btn-no" onclick="reject(${a.id})">拒绝</button>
</div>`
})
}else{
html="暂无待审批内容"
}
document.getElementById("pending").innerHTML=html
}

async function approve(id){
await db.from("applications")
.update({status:"已通过",reviewed_at:new Date().toISOString(),is_current:false})
.eq("id",id)
loadPending()
}

async function reject(id){
await db.from("applications")
.update({status:"已拒绝",reviewed_at:new Date().toISOString(),is_current:false})
.eq("id",id)
loadPending()
}

async function showHistory(){
const {data}=await db.from("applications")
.select("*")
.eq("applicant","皮皮")
.order("created_at",{ascending:false})
.limit(10)

let html="<h4>审批历史</h4>"
data.forEach(a=>{
html+=`<div style="margin-top:6px">
${a.title} | ${a.status} |
${new Date(a.created_at).toLocaleString("zh-CN",{timeZone:"Asia/Shanghai"})}
</div>`
})
document.getElementById("history").innerHTML=html
}
</script>

</body>
</html>
